# Report Portal Client Configuration
# Place this file in src/test/resources/ directory

# ============================================================
# REQUIRED SETTINGS
# ============================================================

# Report Portal backend URL
# Default: http://localhost:5000
reportportal.url=http://localhost:5000

# ============================================================
# OPTIONAL DEFAULT VALUES
# ============================================================
# These can be overridden in code when calling submitRun()

# Default portfolio name
reportportal.portfolio=Enterprise

# Default project name
reportportal.project=My Automation Project

# Default automation pack name
reportportal.pack=Default Test Suite

# ============================================================
# ADVANCED SETTINGS
# ============================================================

# HTTP request timeout in milliseconds
# Default: 5000 (5 seconds)
reportportal.timeout=5000

# Number of retry attempts on failure
# Default: 2
reportportal.retries=2

# Enable or disable Report Portal submission
# Set to false to temporarily disable without removing code
# Default: true
reportportal.enabled=true

# ============================================================
# NOTES
# ============================================================
# - All settings can be overridden using environment variables
# - Environment variable format: REPORTPORTAL_<PROPERTY_NAME>
# - Example: REPORTPORTAL_URL, REPORTPORTAL_PORTFOLIO
# - Priority: Code parameters > Environment variables > This file
# ============================================================
